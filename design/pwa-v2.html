<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CS2 Monitor — Design v2</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#020617;--surface:#0F172A;--border:#1E293B;--text:#F8FAFC;--muted:#64748B;--green:#22C55E;--red:#EF4444;--gold:#F59E0B;--accent:#3B82F6;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fira Sans',-apple-system,sans-serif;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;border:2px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.6)}
.phone-top{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;color:var(--text);font-size:13px;font-weight:600}
.phone-content{height:calc(100% - 54px - 70px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.phone-content::-webkit-scrollbar{display:none}
.nav{display:flex;justify-content:space-around;align-items:center;height:70px;background:var(--surface);border-top:1px solid var(--border);padding-bottom:8px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px;cursor:pointer;padding:8px 16px;border-radius:var(--radius);transition:.2s;min-width:64px;min-height:44px;justify-content:center}
.nav-item.active{color:var(--green)}
.nav-item svg{width:22px;height:22px}
.header{padding:24px 20px 16px}
.header .greeting{font-size:13px;color:var(--muted);margin-bottom:4px}
.header .title{font-size:24px;font-weight:700;color:var(--text);font-family:'Fira Code',monospace}
.header .subtitle{font-size:12px;color:var(--green);margin-top:4px;font-family:'Fira Code',monospace}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 20px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:center}
.stat-card .value{font-size:22px;font-weight:700;color:var(--text);font-family:'Fira Code',monospace}
.stat-card .value.up{color:var(--green)}.stat-card .value.down{color:var(--red)}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:4px}
.section{padding:0 20px;margin-bottom:12px}
.section-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:.15s;min-height:66px}
.item:active{background:#1a2332}
.item img{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px}
.price{text-align:right;flex-shrink:0}
.price .current{font-size:18px;font-weight:700;font-family:'Fira Code',monospace}
.price .current.down{color:var(--red)}.price .current.up{color:var(--green)}
.price .target{font-size:11px;color:var(--muted);margin-top:2px}
.alert{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.alert.trigger{border-left:3px solid var(--red)}
.alert.daily{border-left:3px solid var(--accent)}
.alert .time{font-size:11px;color:var(--muted);margin-bottom:8px}
.alert .msg{font-size:14px;line-height:1.6;color:var(--text)}
.alert .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-top:8px}
.badge-alert{background:#EF444422;color:var(--red)}
.badge-info{background:#3B82F622;color:var(--accent)}
.detail-header{text-align:center;padding:20px}
.detail-header img{width:140px;height:105px;border-radius:8px;object-fit:cover;margin-bottom:12px;background:var(--surface)}
.detail-header .name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-header .wear{font-size:13px;color:var(--gold);font-family:'Fira Code',monospace}
.platforms{display:flex;gap:8px;padding:0 20px;overflow-x:auto}
.platform{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;text-align:center;min-width:76px}
.platform .p{font-size:18px;font-weight:700;font-family:'Fira Code',monospace;color:var(--text)}
.platform .p.low{color:var(--green)}
.platform .src{font-size:10px;color:var(--muted);margin-top:4px}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.setting-item .label{font-size:14px;color:var(--text)}
.setting-item .value{font-size:13px;color:var(--muted)}
.setting-item input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:13px;width:60%;text-align:right;font-family:'Fira Code',monospace}
.setting-item select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:13px}
.search-bar{position:sticky;top:0;z-index:10;background:var(--bg);padding:0 20px 12px}
.search-bar input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px}
.search-bar input::placeholder{color:var(--muted)}
.search-bar .hint{font-size:11px;color:var(--green);margin-top:6px;padding-left:4px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
</style>
</head>
<body>
<div class="phone">
  <div class="phone-top"><span>9:41</span><span>📶 🔋</span></div>
  <div class="phone-content" id="content"></div>
  <div class="nav">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item" id="nav-alerts" onclick="switchTab('alerts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>告警</span>
    </div>
    <div class="nav-item" id="nav-add" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>添加</span>
    </div>
    <div class="nav-item" id="nav-settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>设置</span>
    </div>
  </div>
</div>
<script>
const IMG='https://g.fp.ps.netease.com/market/file/5aa0c29a20e3db746eb9153bVTu67Bg7';
function img(w,h){return'<img src="'+IMG+'" width="'+w+'" height="'+h+'" alt="" style="background:#1E293B">'}
const screens={
home:`
<div class="header"><div class="greeting">早上好 👋</div><div class="title">CS2 Monitor</div><div class="subtitle">● 实时监控中 · 5分钟刷新</div></div>
<div class="stats"><div class="stat-card"><div class="value">12</div><div class="label">监控中</div></div><div class="stat-card"><div class="value up">¥48.5k</div><div class="label">持仓总值</div></div><div class="stat-card"><div class="value down">3</div><div class="label">今日告警</div></div></div>
<div class="section"><div class="section-title">监控列表</div>
<div class="item" onclick="switchTab(\'detail\')">${img(48,48)}<div class="item-info"><div class="item-name">AK-47 | 红线 (久经沙场)</div><div class="item-meta"><span>BUFF</span><span>5分钟前</span></div></div><div class="price"><div class="current down">¥85.50</div><div class="target">目标 ¥80.00</div></div></div>
<div class="item">${img(48,48)}<div class="item-info"><div class="item-name">AWP | 二西莫夫 (略有磨损)</div><div class="item-meta"><span>BUFF</span><span>5分钟前</span></div></div><div class="price"><div class="current">¥320.00</div><div class="target">目标 ¥300.00</div></div></div>
<div class="item">${img(48,48)}<div class="item-info"><div class="item-name">M4A4 | 龙王 (崭新出厂)</div><div class="item-meta"><span>YUYP</span><span>5分钟前</span></div></div><div class="price"><div class="current up">¥156.00</div><div class="target">目标 ¥140.00</div></div></div></div>`,
alerts:`
<div class="header"><div class="title">告警中心</div><div class="subtitle">今日 3 条 · 历史 27 条</div></div>
<div class="section">
<div class="alert trigger"><div class="time">14:32 · 刚刚</div><div class="msg">🔴 AK-47 | 红线 (久经沙场)<br>当前 ¥85.50 → 目标 ¥80.00<br>跌幅 6.5% · BUFF</div><span class="badge badge-alert">触发告警</span></div>
<div class="alert trigger"><div class="time">11:05 · 3小时前</div><div class="msg">🟢 M4A4 | 龙王 (崭新出厂)<br>当前 ¥138.00 → 目标 ¥140.00<br>接近目标 · 悠悠有品</div><span class="badge badge-alert">触发告警</span></div>
<div class="alert daily"><div class="time">09:20 · 今天</div><div class="msg">📊 持仓日报<br>总市值 ¥48,520 (+2.3%)<br>AK-47 红线 +¥2.50 · AWP 二西莫夫 -¥5.00</div><span class="badge badge-info">日报</span></div></div>`,
add:`
<div class="header"><div class="title">添加监控</div><div class="subtitle">搜索饰品名加入监控列表</div></div>
<div class="search-bar"><input placeholder="如 AK-47 红线 久经" value="红线"><div class="hint">匹配 24 件饰品</div></div>
<div class="section">
<div class="item" onclick="switchTab(\'detail\')">${img(48,48)}<div class="item-info"><div class="item-name">AK-47 | 红线 (久经沙场)</div><div class="item-meta">Classified · 0.15 - 0.38</div></div><span style="color:var(--green);font-weight:600;font-size:13px">添加</span></div>
<div class="item">${img(48,48)}<div class="item-info"><div class="item-name">AK-47 | 红线 (崭新出厂)</div><div class="item-meta">Classified · 0.00 - 0.07</div></div><span style="color:var(--green);font-weight:600;font-size:13px">添加</span></div>
<div class="item">${img(48,48)}<div class="item-info"><div class="item-name">AK-47 | 红线 (略有磨损)</div><div class="item-meta">Classified · 0.07 - 0.15</div></div><span style="color:var(--green);font-weight:600;font-size:13px">添加</span></div></div>`,
detail:`
<div class="detail-header"><img src="${IMG}" width="140" height="105" alt=""><div class="name">AK-47 | 红线</div><div class="wear">久经沙场 · Classified</div></div>
<div class="platforms"><div class="platform"><div class="p low">¥85.5</div><div class="src">BUFF</div></div><div class="platform"><div class="p">¥84.0</div><div class="src">悠悠有品</div></div><div class="platform"><div class="p">¥83.5</div><div class="src">C5</div></div><div class="platform"><div class="p">$11.3</div><div class="src">Steam</div></div></div>
<div class="section" style="margin-top:16px"><div class="section-title">监控设置</div>
<div class="setting-item"><span class="label">目标价</span><input value="80.00" placeholder="¥ 目标价"></div>
<div class="setting-item"><span class="label">监控模式</span><select><option>盯价</option><option>持仓</option></select></div>
<div style="display:flex;gap:8px;margin-top:16px"><button style="flex:1;padding:14px;background:var(--green);color:#000;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;min-height:44px;cursor:pointer;font-family:'Fira Sans'">保存</button><button style="padding:14px 20px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:var(--radius);font-size:14px;min-height:44px;cursor:pointer;font-family:'Fira Sans'">删除</button></div></div>`,
settings:`
<div class="header"><div class="title">设置</div></div>
<div class="section"><div class="section-title">通知</div><div class="setting-item"><span class="label">推送通知</span><span class="value" style="color:var(--green)">已开启</span></div></div>
<div class="section"><div class="section-title">价格数据源</div><div class="setting-item"><span class="label">CSQAQ</span><span class="value" style="color:var(--green)">● 已连接</span></div></div>
<div class="section"><div class="section-title">账号</div><div class="setting-item"><span class="label">用户名</span><span class="value">testuser</span></div>
<div class="setting-item"><span class="label">邀请码</span><button style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;min-height:44px;cursor:pointer;font-family:'Fira Sans'">生成新邀请码</button></div>
<button style="width:100%;padding:14px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:var(--radius);font-size:14px;margin-top:16px;min-height:44px;cursor:pointer;font-family:'Fira Sans'">退出登录</button></div>`};
function switchTab(tab){document.getElementById('content').innerHTML=screens[tab]||screens.home;['home','alerts','add','settings'].forEach(function(t){var el=document.getElementById('nav-'+t);if(el)el.classList.toggle('active',t===tab)})}
switchTab('home');
</script>
</body>
</html>
