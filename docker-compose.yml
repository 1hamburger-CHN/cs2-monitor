version: "3.8"
services:
  web:
    build: .
    container_name: cs2monitor-web
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on: {mysql: {condition: service_healthy}}
    volumes: ["./data:/app/data"]
  scheduler:
    build: .
    container_name: cs2monitor-scheduler
    restart: unless-stopped
    command: python -m scheduler.main
    env_file: [.env]
    depends_on: {mysql: {condition: service_healthy}}
    volumes: ["./data:/app/data"]
  mysql:
    image: mysql:8.0
    container_name: cs2monitor-mysql
    restart: unless-stopped
    environment: {MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root123}", MYSQL_DATABASE: cs2monitor, MYSQL_USER: cs2monitor, MYSQL_PASSWORD: "${MYSQL_PASSWORD:-cs2monitor123}"}
    ports: ["3306:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck: {test: ["CMD", "mysqladmin", "ping", "-h", "localhost"], interval: 10s, timeout: 5s, retries: 5}
  caddy:
    image: caddy:2-alpine
    container_name: cs2monitor-caddy
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes: ["./deploy/caddy/Caddyfile.docker:/etc/caddy/Caddyfile", "caddy_data:/data"]
volumes: {mysql_data: null, caddy_data: null}
